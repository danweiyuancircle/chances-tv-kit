name: Release

# 推送 v* tag（如 v0.1.0）时构建并发布所有 public 包到 npm
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # OIDC：npm Trusted Publishing 必需，换取短期发布凭证 + 生成 provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # node20 自带 npm 过旧，OIDC + provenance 需 npm ≥ 11.5.1
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      # private 包（playground）会被自动跳过；workspace:^ 协议发布时由 pnpm 替换为真实版本号
      # OIDC 模式下无需 NODE_AUTH_TOKEN，发布凭证由 id-token 自动换取
      - run: pnpm -r publish --access public --no-git-checks
